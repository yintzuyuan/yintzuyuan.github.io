---
layout: default
title: 所有分類
permalink: /blog/category/
header_title: 🗂️
hide_first_title: true
body_class: home-page
---

<h1>🗂️</h1>

{% for category in site.categories %}
  <h2>{{ category[0] }}</h2>
  <ul>
    {% for post in category[1] %}
      <li>
        <a href="{{ post.url }}">{{ post.title }}</a>
        <p>{{ post.excerpt }}</p>
      </li>
    {% endfor %}
  </ul>
{% endfor %}
