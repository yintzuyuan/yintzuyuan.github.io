---
layout: default
---

<article class="post-content">
  <h1 class="post-title">{{ page.title }}</h1>
  <time class="post-date" datetime="{{ page.date | date: "%Y-%m-%d" }}">{{ page.date | date: "%Y-%m-%d日" }}</time>
  
  <link rel="stylesheet" href="{{ '/blog/styles.css' | relative_url }}">

  <div class="post-body">
    {{ content }}
  </div>
  
  <footer class="post-meta">
    {% if page.categories %}
      <div class="post-categories">
        <span class="meta-label">分類：</span>
        {% for category in page.categories %}
          <a href="/blog/categories/#{{ category | slugize }}" class="category-link">{{ category }}</a>
        {% endfor %}
      </div>
    {% endif %}
    
    {% if page.tags %}
      <div class="post-tags">
        <span class="meta-label">標籤：</span>
        {% for tag in page.tags %}
          <a href="/blog/tags/#{{ tag | slugize }}" class="tag-link">{{ tag }}</a>
        {% endfor %}
      </div>
    {% endif %}
  </footer>
</article>
