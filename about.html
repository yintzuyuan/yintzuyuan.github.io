  <div id="site-footer"></div>

  <script src="data/ui.js"></script>
  <script src="data/timeline.js"></script>
  <script src="assets/app.js"></script>
  <script>
    var bioData = {
      zh: [
        '我是殷慈遠（TzuYuan Yin），字型設計師、Python 開發者、YouTube 創作者。使用 ',
        { text: 'Glyphs', href: 'https://glyphsapp.com/' },
        ' 設計字型，並在 ',
        { text: 'YouTube', href: 'https://www.youtube.com/@erikin1205_typogame' },
        ' 分享設計知識。目前任職於',
        { text: '文鼎字型', href: 'https://www.arphic.com/' },
        '，專注於漢字字型設計與 Glyphs 工具開發。'
      ],
      en: [
        "I'm TzuYuan Yin, a type designer, Python developer, and YouTube creator. I design typefaces with ",
        { text: 'Glyphs', href: 'https://glyphsapp.com/' },
        ' and share design knowledge on ',
        { text: 'YouTube', href: 'https://www.youtube.com/@erikin1205_typogame' },
        '. Currently at ',
        { text: 'Arphic Types', href: 'https://www.arphic.com/' },
        ', focusing on CJK type design and Glyphs tool development.'
      ]
    };

    function parseInlineLinks(text) {
      var frag = document.createDocumentFragment();
      var re = /\[([^\]]+)\]\(([^)]+)\)/g;
      var lastIndex = 0;
      var match;
      while ((match = re.exec(text)) !== null) {
        if (match.index > lastIndex) {
          frag.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
        }
        var a = document.createElement('a');
        a.href = match[2];
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = match[1];
        frag.appendChild(a);
        lastIndex = re.lastIndex;
      }
      if (lastIndex < text.length) {
        frag.appendChild(document.createTextNode(text.slice(lastIndex)));
      }
      return frag;
    }

    function renderTimeline() {
      if (!window.TIMELINE_DATA) return;
      var container = document.getElementById('timeline');
      container.replaceChildren();

      for (var g = 0; g < window.TIMELINE_DATA.length; g++) {
        var group = window.TIMELINE_DATA[g];
        for (var e = 0; e < group.events.length; e++) {
          var event = group.events[e];
          var item = document.createElement('div');
          item.className = 'timeline-item';

          var yearDiv = document.createElement('div');
          yearDiv.className = 'timeline-year';
          yearDiv.textContent = group.year;

          var descDiv = document.createElement('div');
          descDiv.className = 'timeline-desc';
          var rawText = event.text[currentLang] || event.text.zh;
          descDiv.appendChild(parseInlineLinks(rawText));

          item.appendChild(yearDiv);
          item.appendChild(descDiv);
          container.appendChild(item);
        }
      }

      container.querySelectorAll('.timeline-year, .timeline-desc').forEach(function(el, i) {
        el.classList.add('fade-in');
        setTimeout(function() { el.classList.add('visible'); }, Math.floor(i / 2) * 80);
      });
    }

    function updateAboutPage() {
      var bioEl = document.getElementById('about-bio');
      if (bioEl) renderRichText(bioEl, bioData[currentLang] || bioData.zh);
      renderTimeline();
    }

    updateAboutPage();
    document.addEventListener('langchange', updateAboutPage);
  </script>
</body>
