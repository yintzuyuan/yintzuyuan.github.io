<!DOCTYPE html>
<html lang="zh-TW" data-lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 — 殷慈遠</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Noto+Serif+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script defer src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <script>/* theme flash prevention */(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark')})()</script>
  <link rel="stylesheet" href="assets/style.css">
  <script defer src="https://analytics.erikyin.net/script.js" data-website-id="9c15a939-c76d-4f2e-9c9d-93a7db9ab13c" data-domains="erikyin.net"></script>
</head>
<body>

  <div id="site-header"></div>

  <div class="article-header fade-in" id="article-header">
    <a href="writing.html" class="article-back"><i class="ph ph-arrow-left"></i> <span data-i18n="article.back">所有文章</span></a>
    <div class="article-meta">
      <span class="article-date" id="article-date"></span>
      <span class="article-reading-time" id="article-reading-time"></span>
      <div class="article-tags" id="article-tags"></div>
    </div>
    <h1 id="article-title"></h1>
    <p class="article-excerpt" id="article-excerpt"></p>
    <div class="article-accent"></div>
  </div>

  <div class="lang-notice">
    This article is available in Chinese only.<br>
    You may use your browser's built-in translation to read it.
  </div>

  <article class="article-body fade-in" id="article-body"></article>

  <div class="article-tools" id="article-tools"></div>

  <div class="article-end">
    <div class="article-divider"></div>
    <div class="article-author fade-in">
      <img src="assets/images/profile.png" alt="殷慈遠" class="article-author-photo">
      <div>
        <div class="article-author-name" data-i18n="author.name">殷慈遠</div>
        <div class="article-author-desc" data-i18n="author.desc">字型設計師、工具開發者。用工程思維做字，用設計思維寫程式。</div>
      </div>
    </div>
    <div class="newsletter-section fade-in">
      <h2 class="newsletter-title"><i class="ph ph-envelope-simple"></i> <span data-i18n="newsletter.title">設計筆記</span></h2>
      <p class="newsletter-desc" data-i18n="newsletter.desc">不定期分享字型設計思考、工具開發心得，以及創作過程中的發現。</p>
      <form class="newsletter-form" action="https://buttondown.com/api/emails/embed-subscribe/erikyin" method="post" target="_blank">
        <input type="hidden" name="metadata__source" value="website">
        <input type="email" name="email" placeholder="your@email.com" required>
        <button type="submit"><i class="ph ph-paper-plane-tilt"></i> <span data-i18n="newsletter.btn">訂閱</span></button>
      </form>
      <p class="newsletter-privacy" data-i18n="newsletter.privacy">不會寄垃圾信，隨時可以退訂。</p>
    </div>
    <nav class="article-nav fade-in" id="article-nav"></nav>
  </div>

  <div id="site-footer"></div>

  <script src="data/ui.js"></script>
  <script src="data/essays.js"></script>
  <script src="data/tools.js"></script>
  <script src="assets/lib/marked.min.js"></script>
  <script src="assets/app.js"></script>
  <script>
    function getSlug() {
      var params = new URLSearchParams(window.location.search);
      return params.get('slug');
    }

    function findEssay(slug) {
      if (!window.ESSAYS_DATA) return null;
      for (var i = 0; i < window.ESSAYS_DATA.length; i++) {
        if (window.ESSAYS_DATA[i].slug === slug) return { essay: window.ESSAYS_DATA[i], index: i };
      }
      return null;
    }

    function renderArticleHeader(essay) {
      document.title = essay.title + ' — 殷慈遠';
      document.getElementById('article-date').textContent = essay.date;
      document.getElementById('article-title').textContent = essay.title;
      document.getElementById('article-excerpt').textContent = essay.excerpt;

      var tagsContainer = document.getElementById('article-tags');
      tagsContainer.replaceChildren();
      for (var t = 0; t < essay.tags.length; t++) {
        var tagSpan = document.createElement('span');
        tagSpan.className = 'article-tag';
        tagSpan.textContent = essay.tags[t];
        tagsContainer.appendChild(tagSpan);
      }
    }

    function renderArticleNav(currentIndex) {
      var nav = document.getElementById('article-nav');
      nav.replaceChildren();
      var essays = window.ESSAYS_DATA;
      var prevLabels = { zh: '上一篇', en: 'Previous' };
      var nextLabels = { zh: '下一篇', en: 'Next' };

      if (currentIndex < essays.length - 1) {
        var prev = essays[currentIndex + 1];
        var prevLink = document.createElement('a');
        prevLink.href = 'writing-post.html?slug=' + prev.slug;
        prevLink.className = 'article-nav-item';
        var prevLabel = document.createElement('div');
        prevLabel.className = 'article-nav-label';
        var prevIcon = document.createElement('i');
        prevIcon.className = 'ph ph-arrow-left';
        prevLabel.appendChild(prevIcon);
        prevLabel.appendChild(document.createTextNode(' ' + prevLabels[currentLang]));
        var prevTitle = document.createElement('div');
        prevTitle.className = 'article-nav-title';
        prevTitle.textContent = prev.title;
        prevLink.appendChild(prevLabel);
        prevLink.appendChild(prevTitle);
        nav.appendChild(prevLink);
      } else {
        nav.appendChild(document.createElement('div'));
      }

      if (currentIndex > 0) {
        var next = essays[currentIndex - 1];
        var nextLink = document.createElement('a');
        nextLink.href = 'writing-post.html?slug=' + next.slug;
        nextLink.className = 'article-nav-item article-nav-next';
        var nextLabel = document.createElement('div');
        nextLabel.className = 'article-nav-label';
        nextLabel.appendChild(document.createTextNode(nextLabels[currentLang] + ' '));
        var nextIcon = document.createElement('i');
        nextIcon.className = 'ph ph-arrow-right';
        nextLabel.appendChild(nextIcon);
        var nextTitle = document.createElement('div');
        nextTitle.className = 'article-nav-title';
        nextTitle.textContent = next.title;
        nextLink.appendChild(nextLabel);
        nextLink.appendChild(nextTitle);
        nav.appendChild(nextLink);
      }
    }

    function loadArticle() {
      var slug = getSlug();
      if (!slug) { window.location.href = 'writing.html'; return; }

      var result = findEssay(slug);

      if (result) {
        renderArticleHeader(result.essay);
        renderArticleNav(result.index);
      }

      fetch('content/writing/' + slug + '.md')
        .then(function(res) {
          if (!res.ok) throw new Error('Not found');
          return res.text();
        })
        .then(function(md) {
          // 解析並去除 frontmatter（單次 regex）
          var fmMatch = md.match(/^---\n([\s\S]*?)\n---\n*/);
          var content = fmMatch ? md.slice(fmMatch[0].length) : md;

          // 草稿預覽：從 frontmatter 建構 essay 物件，重用 renderArticleHeader
          if (!result && fmMatch) {
            var lines = fmMatch[1].split('\n');
            var fm = {};
            for (var li = 0; li < lines.length; li++) {
              var ci = lines[li].indexOf(':');
              if (ci > -1) {
                var key = lines[li].slice(0, ci).trim();
                var val = lines[li].slice(ci + 1).trim();
                if (val.startsWith('[') && val.endsWith(']')) {
                  var inner = val.slice(1, -1).trim();
                  val = inner ? inner.split(',').map(function(s) { return s.trim(); }) : [];
                } else if (val === 'true') { val = true; }
                else if (val === 'false') { val = false; }
                fm[key] = val;
              }
            }
            renderArticleHeader({
              title: fm.title || slug,
              date: fm.date || '',
              excerpt: fm.excerpt || '',
              tags: Array.isArray(fm.tags) ? fm.tags : []
            });
          }

          if (window.marked) {
            var htmlString = marked.parse(content);
            var parser = new DOMParser();
            var doc = parser.parseFromString(htmlString, 'text/html');
            var body = document.getElementById('article-body');
            body.replaceChildren();
            while (doc.body.firstChild) {
              body.appendChild(doc.body.firstChild);
            }
            body.querySelectorAll('a[href^="http"]').forEach(function(link) {
              link.setAttribute('target', '_blank');
              link.setAttribute('rel', 'noopener noreferrer');
            });
          }

          // 計算閱讀時間
          var plainText = content.replace(/[#*_\[\]()>`~\-|]/g, '');
          var cjk = (plainText.match(/[\u4e00-\u9fff\u3400-\u4dbf]/g) || []).length;
          var words = plainText.replace(/[\u4e00-\u9fff\u3400-\u4dbf]/g, ' ').split(/\s+/).filter(Boolean).length;
          var minutes = Math.max(1, Math.round(cjk / 400 + words / 200));
          var readingLabels = { zh: ' 分鐘閱讀', en: ' min read' };
          document.getElementById('article-reading-time').textContent = minutes + readingLabels[currentLang];

          // 渲染相關工具字卡
          var essay = result ? result.essay : null;
          if (essay && essay.tools && essay.tools.length > 0 && window.TOOLS_DATA) {
            renderArticleTools(essay.tools);
          }
        })
        .catch(function() {
          if (!result) { window.location.href = 'writing.html'; return; }
          var body = document.getElementById('article-body');
          var p = document.createElement('p');
          p.style.color = 'var(--text-secondary)';
          p.textContent = '文章內容載入中...';
          body.replaceChildren(p);
        });
    }

    function renderArticleTools(toolIds) {
      var container = document.getElementById('article-tools');
      if (!container) return;

      var sectionLabels = { zh: '文中提到的工具', en: 'Tools mentioned in this article' };

      var label = document.createElement('div');
      label.className = 'section-label';
      var labelIcon = document.createElement('i');
      labelIcon.className = 'ph ph-wrench';
      label.appendChild(labelIcon);
      label.appendChild(document.createTextNode(' ' + sectionLabels[currentLang]));

      var grid = document.createElement('div');
      grid.className = 'tools-grid';

      for (var i = 0; i < toolIds.length; i++) {
        var tool = window.TOOLS_DATA[toolIds[i]];
        if (!tool) continue;

        var title = typeof tool.title === 'object' ? (tool.title[currentLang] || tool.title.zh) : tool.title;
        var desc = typeof tool.desc === 'object' ? (tool.desc[currentLang] || tool.desc.zh) : tool.desc;

        var card = document.createElement('a');
        card.href = tool.url;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        card.className = 'tool-card fade-in';

        var header = document.createElement('div');
        header.className = 'tool-card-header';
        var icon = document.createElement('i');
        icon.className = 'ph ' + tool.icon + ' tool-card-icon';
        var tag = document.createElement('span');
        tag.className = 'tool-card-tag';
        tag.textContent = tool.tag;
        header.appendChild(icon);
        header.appendChild(tag);

        var h3 = document.createElement('h3');
        h3.textContent = title;

        var p = document.createElement('p');
        p.textContent = desc;

        var footer = document.createElement('div');
        footer.className = 'tool-card-footer';
        footer.appendChild(document.createElement('span'));
        var linkSpan = document.createElement('span');
        linkSpan.className = 'tool-card-link';
        var arrowIcon = document.createElement('i');
        arrowIcon.className = 'ph ph-arrow-right';
        linkSpan.appendChild(arrowIcon);
        footer.appendChild(linkSpan);

        card.appendChild(header);
        card.appendChild(h3);
        card.appendChild(p);
        card.appendChild(footer);
        grid.appendChild(card);
      }

      container.replaceChildren(label, grid);

      // 動態插入的 fade-in 元素需要手動觸發可見
      container.querySelectorAll('.fade-in').forEach(function(el) {
        el.classList.add('visible');
      });
    }

    loadArticle();

    document.addEventListener('langchange', function() {
      var slug = getSlug();
      var result = findEssay(slug);
      if (result) {
        renderArticleHeader(result.essay);
        renderArticleNav(result.index);
      }
    });
  </script>
</body>
</html>
