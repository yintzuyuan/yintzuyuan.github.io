    /* ===== Glyph Field — 靜謐文字織體 ===== */
    (function() {
      /* Step 1: 加權字元分布 — CJK 為主角 */
      var UNICODE_RANGES = [
        { range: [0x4E00, 0x9FFF], weight: 45, type: 'cjk' },    // CJK — 主角
        { range: [0x3040, 0x309F], weight: 8, type: 'cjk' },     // Hiragana
        { range: [0x30A0, 0x30FF], weight: 8, type: 'cjk' },     // Katakana
        { range: [0xAC00, 0xD7AF], weight: 8, type: 'cjk' },     // Hangul
        { range: [0x3100, 0x312F], weight: 5, type: 'cjk' },     // Bopomofo
        { range: [0x0030, 0x0039], weight: 3, type: 'latin' },   // Digits
        { range: [0x0041, 0x005A], weight: 4, type: 'latin' },   // A-Z
        { range: [0x0061, 0x007A], weight: 4, type: 'latin' },   // a-z
        { range: [0x007B, 0x007E], weight: 3, type: 'latin' },   // { | } ~
        { range: [0x003C, 0x003E], weight: 3, type: 'latin' },   // < = >
        { range: [0x0021, 0x002F], weight: 4, type: 'latin' },   // ! " # $ % ...
        { range: [0x005B, 0x0060], weight: 3, type: 'latin' },   // [ \ ] ^ _ `
      ];
      var weightedTotal = 0;
      for (var i = 0; i < UNICODE_RANGES.length; i++) weightedTotal += UNICODE_RANGES[i].weight;

      /* Step 7: ■ 精煉 — 降至 0.07，混入 □ (3:1) */
      var SQUARE_CHANCE = 0.07;
      var SQUARES = ['\u25A0', '\u25A0', '\u25A0', '\u25A1'];

      function pickWeightedRange() {
        var r = Math.random() * weightedTotal;
        for (var i = 0; i < UNICODE_RANGES.length; i++) {
          r -= UNICODE_RANGES[i].weight;
          if (r <= 0) return UNICODE_RANGES[i];
        }
        return UNICODE_RANGES[0];
      }

      function randomChar() {
        if (Math.random() < SQUARE_CHANCE) {
          return { ch: SQUARES[Math.floor(Math.random() * SQUARES.length)], type: 'square' };
        }
        var entry = pickWeightedRange();
        var cp = entry.range[0] + Math.floor(Math.random() * (entry.range[1] - entry.range[0] + 1));
        return { ch: String.fromCodePoint(cp), type: entry.type };
      }

      /* Step 5: 字型大小 class 套用 */
      function applyCharToSpan(span) {
        var result = randomChar();
        span.textContent = result.ch;
        span.className = 'glyph-' + result.type;
      }

      /* Step 4: 視覺深度 — 中心漸層 */
      function cellOpacity(row, col, cols) {
        var cx = (cols - 1) / 2;
        var cy = cx;
        var dist = Math.sqrt(Math.pow(row - cy, 2) + Math.pow(col - cx, 2)) / cx;
        var factor = 1 - Math.min(dist, 1) * 0.4;
        return (0.06 + Math.random() * 0.06) * factor;
      }

      var field = document.getElementById('glyph-field');
      if (!field) return;

      var isMobile = window.matchMedia('(max-width: 768px)').matches;
      var cols = isMobile ? 12 : 17;
      var total = cols * cols;
      var spans = [];
      var cx = (cols - 1) / 2;
      var cy = cx;

      for (var i = 0; i < total; i++) {
        var s = document.createElement('span');
        applyCharToSpan(s);
        s.style.opacity = '0';
        field.appendChild(s);
        spans.push(s);
      }

      /* Step 6: 入場掃描 — 左到右，各行速度不一 */
      var rowOffsets = [];
      for (var i = 0; i < cols; i++) rowOffsets.push(Math.random() * 600 - 300);
      for (var i = 0; i < spans.length; i++) {
        (function(span, idx) {
          var row = Math.floor(idx / cols);
          var col = idx % cols;
          var startDelay = Math.max(0, col * 80 + rowOffsets[row] + Math.random() * 150);
          var targetOp = cellOpacity(row, col, cols);

          var flips = 3 + Math.floor(Math.random() * 4);
          var baseInterval = 60 + Math.random() * 20;
          setTimeout(function() {
            span.style.transition = 'none';
            span.style.opacity = '0.20';
            var done = 0;
            function doFlip() {
              done++;
              if (done < flips) {
                applyCharToSpan(span);
                var delay = done >= flips - 2
                  ? baseInterval + (done - (flips - 2)) * 60
                  : baseInterval;
                setTimeout(doFlip, delay);
              } else {
                applyCharToSpan(span);
                span.style.opacity = String(targetOp);
                span.style.transition = '';
              }
            }
            doFlip();
          }, startDelay);
        })(spans[i], i);
      }

      /* Step 3: 效能優化 — Page Visibility + IntersectionObserver */
      var isVisible = true;
      var cycleRunning = false;

      document.addEventListener('visibilitychange', function() {
        var wasVisible = isVisible;
        isVisible = !document.hidden && fieldInView;
        if (isVisible && !wasVisible && !cycleRunning) scheduleNextCycle();
      });

      var fieldInView = true;
      var observer = new IntersectionObserver(function(entries) {
        var wasVisible = isVisible;
        fieldInView = entries[0].isIntersecting;
        isVisible = !document.hidden && fieldInView;
        if (isVisible && !wasVisible && !cycleRunning) scheduleNextCycle();
      });
      observer.observe(field);

      /* Step 2: 遞迴 setTimeout，burst 節奏感 */
      var burstCount = 0;
      var burstLength = 2 + Math.floor(Math.random() * 3); /* 每陣 2-4 次 */
      function scheduleNextCycle() {
        if (!isVisible) { cycleRunning = false; return; }
        cycleRunning = true;

        /* 一陣快節奏後插入較長停頓 */
        var isBurstEnd = burstCount >= burstLength;
        var delay = isBurstEnd
          ? 2500 + Math.random() * 1500   /* 停頓：2.5-4 秒 */
          : 800 + Math.random() * 600;    /* 陣內：0.8-1.4 秒 */

        if (isBurstEnd) {
          burstCount = 0;
          burstLength = 2 + Math.floor(Math.random() * 3);
        }

        setTimeout(function() {
          if (!isVisible) { cycleRunning = false; return; }
          burstCount++;

          var count = 4 + Math.floor(Math.random() * 4);
          for (var j = 0; j < count; j++) {
            (function() {
              var idx = Math.floor(Math.random() * spans.length);
              var span = spans[idx];
              var row = Math.floor(idx / cols);
              var col = idx % cols;
              var flips = 4 + Math.floor(Math.random() * 5);
              var baseInterval = 60 + Math.random() * 20;
              var stagger = Math.random() * 350;

              /* Step 4: ~15% 機率亮閃 — 墨跡反光 */
              var isFlash = Math.random() < 0.15;
              var flashOp = isFlash ? 0.35 : 0.22;

              setTimeout(function() {
                span.style.opacity = String(flashOp);

                /* Step 5: 亮閃漣漪 — 等高線式區域擴散 */
                if (isFlash) {
                  var rippleRadius = 2;
                  var rows = Math.ceil(spans.length / cols);
                  for (var dr = -rippleRadius; dr <= rippleRadius; dr++) {
                    for (var dc = -rippleRadius; dc <= rippleRadius; dc++) {
                      if (dr === 0 && dc === 0) continue;
                      var nr = row + dr, nc = col + dc;
                      if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
                      var dist = Math.sqrt(dr * dr + dc * dc);
                      if (dist > rippleRadius) continue;
                      var ni = nr * cols + nc;
                      if (ni >= spans.length) continue;
                      var nSpan = spans[ni];
                      var boost = 0.15 * (1 - dist / (rippleRadius + 0.5));
                      var nBase = cellOpacity(nr, nc, cols);
                      var rippleDelay = Math.floor(dist * 80 + Math.random() * 40);
                      (function(s, op, base) {
                        setTimeout(function() {
                          s.style.transition = 'opacity 0.15s ease-in';
                          s.style.opacity = String(Math.min(base + op, 0.35));
                          setTimeout(function() {
                            s.style.transition = 'opacity 0.6s ease-out';
                            s.style.opacity = String(base);
                          }, 200 + Math.random() * 100);
                        }, rippleDelay);
                      })(nSpan, boost, nBase);
                    }
                  }
                }

                var done = 0;
                function doFlip() {
                  done++;
                  if (done < flips) {
                    applyCharToSpan(span);
                    var delay = done >= flips - 3
                      ? baseInterval + (done - (flips - 3)) * 50
                      : baseInterval;
                    setTimeout(doFlip, delay);
                  } else {
                    applyCharToSpan(span);
                    span.style.opacity = String(cellOpacity(row, col, cols));
                  }
                }
                doFlip();
              }, stagger);
            })();
          }

          scheduleNextCycle();
        }, delay);
      }

      // 入場完成後啟動常態循環
      setTimeout(function() { scheduleNextCycle(); }, 2000);
    })();
  </script>
